id: worldcup-topscorer
name: worldcup-topscorer
version: 1.0.11
services:
  auth:
    enabled: true
    customClaims:
      app_version: 1.0.0
    scopes:
      - read:data
      - write:data
    password:
      enabled: false
    allowedRedirectUris:
      - http://localhost:5173
      - https://hasty-tarn-a20bfa49da-swedencentral.webapp.fabricapps.net
    fabric:
      enabled: true
  data:
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
  storage:
    enabled: false
  functions:
    enabled: false
